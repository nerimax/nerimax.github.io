<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AstroBoost</title>

	<meta name="description" content="AstroBoost - A challenging arcade action game created by a Japanese game developer with 40 years of experience.">

	<style>
		body{
			margin:0;
			font-family:-apple-system,BlinkMacSystemFont,sans-serif;
			background:#0b1020;
			color:#fff;
			text-align:center;
		}

		.container{
			max-width:900px;
			margin:auto;
			padding:40px 20px;
		}

		h1{
			font-size:48px;
			margin-bottom:10px;
		}

		.tagline{
			font-size:24px;
			opacity:0.8;
			margin-bottom:40px;
		}

		.hero{
			width:100%;
			max-width:400px;
			border-radius:20px;
			box-shadow:0 0 30px rgba(255,255,255,0.2);
		}

		p{
			line-height:1.8;
			font-size:18px;
		}

		.button{
			display:inline-block;
			margin-top:30px;
			padding:16px 32px;
			background:#007aff;
			color:#fff;
			text-decoration:none;
			border-radius:12px;
			font-size:20px;
			font-weight:bold;
		}

		.footer{
			margin-top:60px;
			opacity:0.6;
			font-size:14px;
		}
	</style>
</head>
<body>

	<div class="container">

		<h1>ASTRO BOOST</h1>

		<div class="tagline">
			Tap. Hold. Survive.
		</div>

		<img class="hero" src="../images/icon.png" alt="AstroBoost">

		<p>
			A brutally challenging arcade action game.<br>
			Simple controls, intense gameplay.
		</p>

		<p>
			Created by Shintaro Nakaoka,<br>
			a Japanese game developer with 40 years of experience.
		</p>

		<a class="button"
			href="https://apps.apple.com/jp/app/astroboost/id6761886332">
			Download on the App Store
		</a>

		<div class="footer">
			© AstroBoost
		</div>

	</div>

</body>
</html>
